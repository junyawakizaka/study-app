<head>
  <meta charset="UTF-8">
<style>
body {
  font-family: sans-serif;
  background: linear-gradient(to bottom, #87ceeb, #ffffff);
  margin: 0;
  padding: 10px;
}

/* タイトル */
h1 {
  text-align: center;
  color: #ff6600;
}

/* ボタン共通 */
button {
  font-size: 16px;
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
}

/* 正解 */
button[onclick*="true"] {
  background-color: #4CAF50;
  color: white;
}

/* 不正解 */
button[onclick*="false"] {
  background-color: #f44336;
  color: white;
}

/* ユニットボタン */
button[onclick^="selectUnit"] {
  background-color: #2196F3;
  color: white;
}

/* 問題カード */
#question div {
  background: white;
  border-radius: 12px;
  padding: 10px;
  margin: 10px 0;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}

/* 問題文 */
#question p {
  font-size: 18px;
}

/* 下線 */
.kanji {
  text-decoration: underline;
}

/* 波線 */
.okurigana {
  text-decoration: underline wavy;
}

#progress {
  background: #ddd;
  border-radius: 10px;
  overflow: hidden;
  margin: 10px 0;
}

#progress-bar {
  height: 20px;
  background: linear-gradient(to right, #4CAF50, #8BC34A);
  width: 0%;
  color: white;
  text-align: center;
  font-size: 12px;
}

</style>
</head>
<body>
  <h1>問題アプリ</h1>
    <button onclick="selectUnit('1')">①</button>
<button onclick="selectUnit('2')">②</button>
  <br>
  <button onclick="showWeak()">苦手だけ</button>
<button onclick="showAll()">すべて</button>
<div id="progress"></div>
  <p id="question"></p>
<div id="result"></div>
<script>
const units = {
  "1": [
    { id: "q1", text: "$やま$に#のぼる#", answer: ["山", "登る"] },
    { id: "q2", text: "$うみ$に#いく#", answer: ["海", "行く"] }
  ],
  "2": [
    { id: "q3", text: "$かわ$で#あそぶ#", answer: ["川", "遊ぶ"] }
  ]
};

let currentUnit = "1";
let questions = units[currentUnit];

function formatText(text) {
  return text
    .replace(/\$(.*?)\$/g, '<span class="kanji">$1</span>')
    .replace(/#(.*?)#/g, '<span class="okurigana">$1</span>');
}

function renderQuestions(list) {
  let html = "";

  list.forEach((q, index) => {
    const formatted = formatText(q.text);

    html += `
      <div>
        <p>${index + 1}. ${formatted}</p>
        <button onclick="answer('${q.id}', true)">正解</button>
        <button onclick="answer('${q.id}', false)">不正解</button>
      </div>
    `;
  });

  document.getElementById("question").innerHTML = html;
}

function answer(id, result) {
  const data = JSON.parse(localStorage.getItem("answers") || "{}");

  data[id] = result;

  localStorage.setItem("answers", JSON.stringify(data));
  // ★ここ追加
  const resultDiv = document.getElementById("result");
  if (result) {
    resultDiv.innerHTML = "🔥 正解！";
    resultDiv.className = "correct";
  } else {
    resultDiv.innerHTML = "💥 不正解！";
    resultDiv.className = "wrong";
  }
  console.log(id, result);
  updateProgress();
}

function selectUnit(unit) {
  currentUnit = unit;
  questions = units[unit];
  renderQuestions(questions);
}

function showWeak() {
  const data = JSON.parse(localStorage.getItem("answers") || "{}");

  const weakQuestions = questions.filter(q => data[q.id] === false);

  renderQuestions(weakQuestions);
}

function showAll() {
  renderQuestions(questions);
}
function updateProgress() {
  const data = JSON.parse(localStorage.getItem("answers") || "{}");

  const total = questions.length;
  let answered = 0;

  questions.forEach(q => {
    if (data[q.id] !== undefined) {
      answered++;
    }
  });

  const percent = Math.floor((answered / total) * 100);

  document.getElementById("progress").innerHTML =
    `<div id="progress-bar" style="width:${percent}%">${answered}/${total}</div>`;
}
// 初期表示
renderQuestions(questions);
updateProgress();
</script>
