<head>
  <meta charset="UTF-8">
  <style>
.kanji {
  text-decoration: underline;
}
.okurigana {
  text-decoration: underline wavy;
}
</style>
</head>
<body>
  <h1>問題アプリ</h1>
  <button onclick="selectUnit('1')">①</button>
<button onclick="selectUnit('2')">②</button>
  <p id="question"></p>
  <button onclick="answer(true)">正解</button>
  <button onclick="answer(false)">不正解</button>

  <script>
let currentIndex = 0;

const units = {
  "1": [
    { id: "q1", text: "$やま$に#のぼる#", answer: ["山", "登る"] },
    { id: "q2", text: "$うみ$に#いく#", answer: ["海", "行く"] }
  ],
  "2": [
    { id: "q3", text: "$かわ$で#あそぶ#", answer: ["川", "遊ぶ"] }
  ]
};

// ★ここを追加（外に出す）
let currentUnit = "1";
let questions = units[currentUnit];

showQuestion();

function showQuestion() {
  const q = questions[currentIndex];
  const html = formatText(q.text);
  document.getElementById("question").innerHTML = html;

  document.getElementById("answer").innerHTML = "";
}

function answer(result) {
  const data = JSON.parse(localStorage.getItem("answers") || "{}");
  const q = questions[currentIndex];

  data[q.id] = result;
  localStorage.setItem("answers", JSON.stringify(data));

  currentIndex++;

  if (currentIndex < questions.length) {
    showQuestion();
  } else {
    alert("おわり！");
  }
}

function selectUnit(unit) {
  currentUnit = unit;
  questions = units[unit];
  currentIndex = 0;
  showQuestion();
}

    function formatText(text) {
  return text
    .replace(/\$(.*?)\$/g, '<span class="kanji">$1</span>')
    .replace(/#(.*?)#/g, '<span class="okurigana">$1</span>');
}
    
</script>
