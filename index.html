<head>
  <meta charset="UTF-8">
<style>
body {
  font-family: sans-serif;
  margin: 0;
  padding: 10px;
  background: #f0f4f8;
}

/* タイトル */
h1 {
  text-align: center;
  font-size: 22px;
  margin-bottom: 10px;
}

/* 問題カード */
#question div {
  background: white;
  border-radius: 16px;
  padding: 16px;
  margin: 12px 0;
  box-shadow: 0 3px 8px rgba(0,0,0,0.15);
}

/* 問題文（ここが一番重要） */
#question p {
  font-size: 20px;      /* ←大きく */
  line-height: 1.6;     /* ←読みやすさUP */
  margin-bottom: 12px;
}

/* ボタン */
button {
  font-size: 16px;
  padding: 10px 14px;
  margin-right: 8px;
  border-radius: 10px;
  border: none;
}

/* 正解ボタン */
button[onclick*="true"] {
  background: #4CAF50;
  color: white;
}

/* 不正解ボタン */
button[onclick*="false"] {
  background: #f44336;
  color: white;
}

/* 上部ボタン */
button[onclick^="selectUnit"],
button[onclick^="show"] {
  background: #2196F3;
  color: white;
}

/* 下線 */
.kanji {
  text-decoration: underline;
  text-decoration-thickness: 3px; /* 太くする */
}

/* 波線 */
.okurigana {
  text-decoration: underline wavy;
  text-decoration-thickness: 2px;
}
</style>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <h1>問題アプリ</h1>
    <button onclick="selectUnit('6-1')">6-1</button>
<button onclick="selectUnit('6-2')">6-1</button>
  <br>
  <button onclick="showWeak()">苦手だけ</button>
<button onclick="showAll()">すべて</button>
<div id="progress"></div>
  <div id="result"></div>
  <p id="question"></p>

<script>
const units = {
  "6-1": [
    { id: "q1-1", text: "$せすじ$が#さむく#なる", answer: ["海", "行く"] },
    { id: "q1-2", text: "#おさない#ころの#おもい#$で$", answer: ["海", "行く"] },
    { id: "q1-3", text: "$うら$の$やま$に#のぼる#", answer: ["海", "行く"] },
    { id: "q1-4", text: "$きりょく$を#ふるい##おこす#", answer: ["海", "行く"] },
    { id: "q1-5", text: "$じしゃく$が$きた$をさす", answer: ["海", "行く"] },
    { id: "q1-6", text: "$あめ$が#ふる#", answer: ["海", "行く"] },
    { id: "q1-7", text: "$ゆう$#ぐれ#の$そら$", answer: ["海", "行く"] },
    { id: "q1-8", text: "$ひ$ばちの$なか$の$はい$", answer: ["海", "行く"] },
    { id: "q1-9", text: "しもが#おりる#", answer: ["海", "行く"] },
    { id: "q1-10", text: "#あたたかい#$ひ$#ざし#", answer: ["海", "行く"] }
  ],
  "6-2": [
    { id: "q2-1", text: "$わたし$の$ほん$", answer: ["川", "遊ぶ"] },
    { id: "q2-2", text: "$しょうらい$の$ゆめ$を#かたる#", answer: ["川", "遊ぶ"] },
    { id: "q2-3", text: "$せい$#くらべ#をする", answer: ["川", "遊ぶ"] },
    { id: "q2-4", text: "うでの$きんにく$", answer: ["川", "遊ぶ"] },
    { id: "q2-5", text: "セミの$ようちゅう$", answer: ["川", "遊ぶ"] },
    { id: "q2-6", text: "$こうふん$しながら#はなす#", answer: ["川", "遊ぶ"] },
    { id: "q2-7", text: "$こうすいりょう$を#しらべる#", answer: ["川", "遊ぶ"] },
    { id: "q2-8", text: "$おんだん$な$きこう$", answer: ["川", "遊ぶ"] },
    { id: "q2-9", text: "$してつ$を$りよう$する", answer: ["川", "遊ぶ"] },
    { id: "q2-10", text: "$わたくしごと（しじ）$で#ことわる#", answer: ["川", "遊ぶ"] }
  ]
};

let currentUnit = "1";
let questions = units[currentUnit];

function formatText(text) {
  return text
    .replace(/\$(.*?)\$/g, '<span class="kanji">$1</span>')
    .replace(/#(.*?)#/g, '<span class="okurigana">$1</span>');
}

function renderQuestions(list) {
  const data = JSON.parse(localStorage.getItem("answers") || "{}");

  let html = "";

  list.forEach((q, index) => {
    const formatted = formatText(q.text);

    let mark = "";
    if (data[q.id] === true) {
      mark = "⭕";
    } else if (data[q.id] === false) {
      mark = "❌";
    }

    html += `
      <div>
        <p>${index + 1}. ${formatted} ${mark}</p>
        <button onclick="answer('${q.id}', true)">正解</button>
        <button onclick="answer('${q.id}', false)">不正解</button>
      </div>
    `;
  });

  document.getElementById("question").innerHTML = html;
}

function answer(id, result) {
  const data = JSON.parse(localStorage.getItem("answers") || "{}");

  data[id] = result;

  localStorage.setItem("answers", JSON.stringify(data));
  // ★ここ追加
  const resultDiv = document.getElementById("result");
  if (result) {
    resultDiv.innerHTML = "🔥 正解！";
    resultDiv.className = "correct";
  } else {
    resultDiv.innerHTML = "💥 不正解！";
    resultDiv.className = "wrong";
  }
  console.log(id, result);
  updateProgress();
  renderQuestions(questions);
}

function selectUnit(unit) {
  currentUnit = unit;
  questions = units[unit];
  renderQuestions(questions);
}

function showWeak() {
  const data = JSON.parse(localStorage.getItem("answers") || "{}");

  const weakQuestions = questions.filter(q => data[q.id] === false);

  renderQuestions(weakQuestions);
}

function showAll() {
  renderQuestions(questions);
}
function updateProgress() {
  const data = JSON.parse(localStorage.getItem("answers") || "{}");

  const total = questions.length;
  let answered = 0;

  questions.forEach(q => {
    if (data[q.id] !== undefined) {
      answered++;
    }
  });

  const percent = Math.floor((answered / total) * 100);

  document.getElementById("progress").innerHTML =
    `<div id="progress-bar" style="width:${percent}%">${answered}/${total}</div>`;
}
// 初期表示
renderQuestions(questions);
updateProgress();
</script>
